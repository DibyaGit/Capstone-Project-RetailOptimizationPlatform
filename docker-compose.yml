version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: RetailOptimizationPlatform.Web/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - db
      - api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  api:
    build:
      context: .
      dockerfile: RetailOptimizationPlatform.Api/Dockerfile
    ports:
      - "5001:80"
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_Secure_Password_123!